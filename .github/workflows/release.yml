name: 桌面端发布候选与受保护发布

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "用于只读发布候选校验的精确版本标签（vX.Y.Z）"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: 校验发布契约
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0
      - name: 解析发布身份
        id: identity
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          node -e 'const tag=process.env.REQUESTED_TAG;if(!/^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/.test(tag))process.exit(1)'
          echo "tag=${REQUESTED_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${REQUESTED_TAG#v}" >> "${GITHUB_OUTPUT}"
      - run: npm ci
      - run: npm run check:security
      - run: npm run check:release
      - run: npm audit --omit=dev
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo audit
      - run: cargo deny check --warn unmaintained
      - run: npm run check:release-tag -- "${{ steps.identity.outputs.tag }}"

  build-windows:
    name: 构建 Windows x86_64 NSIS
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: 准备 Windows SQLCipher 构建依赖
        shell: pwsh
        run: |
          $perlPath = (Get-Command perl -ErrorAction SilentlyContinue).Source
          if (-not $perlPath) {
            choco install strawberryperl --no-progress --yes
            "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
            $perlPath = "C:\Strawberry\perl\bin\perl.exe"
          }
          & $perlPath -v
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run ci:validate
      - name: 校验 Windows 签名 Secret 完整性
        id: windows-signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $names = @("WINDOWS_CERTIFICATE", "WINDOWS_CERTIFICATE_PASSWORD")
          $present = @{
            WINDOWS_CERTIFICATE = -not [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)
            WINDOWS_CERTIFICATE_PASSWORD = -not [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE_PASSWORD)
          }
          $count = @($names | Where-Object { $present[$_] }).Count
          if ($count -eq 0) {
            "mode=absent" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          elseif ($count -eq $names.Count) {
            "mode=complete" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          else {
            $missing = $names | Where-Object { -not $present[$_] }
            throw "Windows 签名配置不完整，缺少：$($missing -join ', ')"
          }
      - name: 导入临时 Authenticode 证书
        id: windows-cert
        if: steps.windows-signing.outputs.mode == 'complete'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "unimail-signing.pfx"
          $configPath = Join-Path $env:RUNNER_TEMP "unimail-windows-signing.json"
          $cleanupPath = Join-Path $env:RUNNER_TEMP "unimail-imported-certs.txt"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $before = @(Get-ChildItem Cert:\CurrentUser\My | ForEach-Object Thumbprint)
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null
          $after = @(Get-ChildItem Cert:\CurrentUser\My)
          $newThumbprints = @($after | Where-Object { $_.Thumbprint -notin $before } | ForEach-Object Thumbprint)
          $newThumbprints | Set-Content -LiteralPath $cleanupPath
          $signers = @($after | Where-Object {
            $_.Thumbprint -in $newThumbprints -and
            $_.HasPrivateKey -and
            $_.NotAfter -gt (Get-Date) -and
            ($_.EnhancedKeyUsageList.ObjectId -contains "1.3.6.1.5.5.7.3.3")
          })
          if ($signers.Count -ne 1) {
            throw "PFX 必须精确包含一个当前有效的代码签名证书。"
          }
          $signer = $signers[0]
          @{
            bundle = @{
              windows = @{
                certificateThumbprint = $signer.Thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = "https://timestamp.digicert.com"
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $configPath -Encoding utf8
          "thumbprint=$($signer.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "identity=$($signer.Subject)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "config=$configPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: 构建未签名 Windows 候选
        if: steps.windows-signing.outputs.mode == 'absent'
        run: npm run tauri build -- --bundles nsis
      - name: 构建 Authenticode Windows 候选
        if: steps.windows-signing.outputs.mode == 'complete'
        run: npm run tauri build -- --bundles nsis --config "${{ steps.windows-cert.outputs.config }}"
      - name: 验证 Windows 安装包签名状态
        id: windows-package
        shell: pwsh
        env:
          SIGNING_MODE: ${{ steps.windows-signing.outputs.mode }}
          EXPECTED_THUMBPRINT: ${{ steps.windows-cert.outputs.thumbprint }}
          SIGNING_IDENTITY: ${{ steps.windows-cert.outputs.identity }}
        run: |
          $candidates = @(Get-ChildItem target, src-tauri/target -Recurse -File -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match '[/\\]bundle[/\\]nsis[/\\]' })
          if ($candidates.Count -ne 1) {
            throw "Windows 发布必须精确产生一个 NSIS 安装包。"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $candidates[0].FullName
          if ($env:SIGNING_MODE -eq "complete") {
            if ($signature.Status -ne "Valid" -or $signature.SignerCertificate.Thumbprint -ne $env:EXPECTED_THUMBPRINT) {
              throw "Windows Authenticode 验证失败。"
            }
            "signing=authenticode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "identity=$env:SIGNING_IDENTITY" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          elseif ($signature.Status -eq "NotSigned") {
            "signing=unsigned" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "identity=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          else {
            throw "无 Windows 签名 Secret 时，安装包必须准确保持未签名状态。"
          }
          "path=$($candidates[0].FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - name: 验证 Windows 原生应用可启动
        shell: pwsh
        run: ./scripts/check-native-startup.ps1 -TargetRoot target/release
      - name: 暂存 Windows 候选与 provenance
        shell: pwsh
        run: node scripts/release-contract.mjs stage --platform windows --installer "${{ steps.windows-package.outputs.path }}" --output-dir "$env:RUNNER_TEMP/unimail-windows-candidate" --version "${{ needs.validate.outputs.version }}" --tag "${{ needs.validate.outputs.tag }}" --commit "${{ github.sha }}" --signing "${{ steps.windows-package.outputs.signing }}" --signing-identity "${{ steps.windows-package.outputs.identity }}" --notarized false --startup-passed true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-windows-${{ needs.validate.outputs.tag }}
          path: ${{ runner.temp }}/unimail-windows-candidate/*
          if-no-files-found: error
          retention-days: 14
      - name: 清理 Windows 临时签名材料
        if: always()
        shell: pwsh
        run: |
          $cleanupPath = Join-Path $env:RUNNER_TEMP "unimail-imported-certs.txt"
          if (Test-Path -LiteralPath $cleanupPath) {
            Get-Content -LiteralPath $cleanupPath | Where-Object { $_ } | ForEach-Object {
              Remove-Item -LiteralPath "Cert:\CurrentUser\My\$_" -Force -ErrorAction SilentlyContinue
            }
          }
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "unimail-signing.pfx") -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "unimail-windows-signing.json") -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $cleanupPath -Force -ErrorAction SilentlyContinue

  build-macos:
    name: 构建 macOS Universal DMG
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm run ci:validate
      - name: 校验 Apple 签名与公证 Secret 完整性
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          names=(APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID)
          present=0
          missing=()
          for name in "${names[@]}"; do
            if [[ -n "${!name:-}" ]]; then
              present=$((present + 1))
            else
              missing+=("${name}")
            fi
          done
          if [[ ${present} -eq 0 ]]; then
            echo "mode=absent" >> "${GITHUB_OUTPUT}"
          elif [[ ${present} -eq ${#names[@]} ]]; then
            echo "mode=complete" >> "${GITHUB_OUTPUT}"
          else
            printf 'Apple 签名/公证配置不完整，缺少：%s\n' "${missing[*]}" >&2
            exit 1
          fi
      - name: 导入临时 Developer ID 证书
        id: apple-cert
        if: steps.apple-signing.outputs.mode == 'complete'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          p12="${RUNNER_TEMP}/unimail-signing.p12"
          keychain="${RUNNER_TEMP}/unimail-signing.keychain-db"
          config="${RUNNER_TEMP}/unimail-macos-signing.json"
          keychain_password="$(uuidgen)"
          printf '%s' "${APPLE_CERTIFICATE}" | openssl base64 -d -A -out "${p12}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${p12}" -P "${APPLE_CERTIFICATE_PASSWORD}" -A -k "${keychain}" -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain}" >/dev/null
          security list-keychains -d user -s "${keychain}" login.keychain-db
          security find-identity -v -p codesigning "${keychain}" > "${RUNNER_TEMP}/unimail-identities.txt"
          identity_line="$(grep -F "${APPLE_SIGNING_IDENTITY}" "${RUNNER_TEMP}/unimail-identities.txt")"
          [[ "$(printf '%s\n' "${identity_line}" | wc -l | tr -d ' ')" == "1" ]]
          resolved_identity="$(printf '%s\n' "${identity_line}" | sed -E 's/^[[:space:]]*[0-9]+\) [0-9A-Fa-f]+ "(.*)"$/\1/')"
          [[ -n "${resolved_identity}" && "${resolved_identity}" != "${identity_line}" ]]
          CONFIG_PATH="${config}" IDENTITY="${APPLE_SIGNING_IDENTITY}" node -e 'const fs=require("fs");fs.writeFileSync(process.env.CONFIG_PATH,JSON.stringify({bundle:{macOS:{signingIdentity:process.env.IDENTITY}}}))'
          echo "config=${config}" >> "${GITHUB_OUTPUT}"
          echo "identity=${resolved_identity}" >> "${GITHUB_OUTPUT}"
      - name: 构建 ad-hoc macOS Universal 候选
        if: steps.apple-signing.outputs.mode == 'absent'
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg
      - name: 构建签名并公证的 macOS Universal 候选
        if: steps.apple-signing.outputs.mode == 'complete'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg --config "${{ steps.apple-cert.outputs.config }}"
      - name: 验证 macOS DMG 签名、公证与架构
        id: macos-package
        shell: bash
        env:
          SIGNING_MODE: ${{ steps.apple-signing.outputs.mode }}
          EXPECTED_SIGNING_IDENTITY: ${{ steps.apple-cert.outputs.identity }}
        run: |
          set -euo pipefail
          candidates=()
          while IFS= read -r -d '' candidate; do
            candidates+=("${candidate}")
          done < <(find target/universal-apple-darwin/release/bundle/dmg -type f -name '*.dmg' -print0)
          if [[ ${#candidates[@]} -ne 1 ]]; then
            echo "macOS 发布必须精确产生一个 Universal DMG。" >&2
            exit 1
          fi
          dmg="${candidates[0]}"
          if [[ "${SIGNING_MODE}" == "complete" ]]; then
            mount_point="${RUNNER_TEMP}/unimail-dmg"
            mkdir -p "${mount_point}"
            hdiutil attach "${dmg}" -nobrowse -readonly -mountpoint "${mount_point}" >/dev/null
            app="$(find "${mount_point}" -maxdepth 2 -type d -name '*.app' -print -quit)"
            [[ -n "${app}" ]]
            codesign --verify --deep --strict --verbose=2 "${app}"
            spctl --assess --type execute --verbose=4 "${app}"
            xcrun stapler validate "${dmg}"
            codesign -dv --verbose=4 "${app}" 2> "${RUNNER_TEMP}/unimail-codesign.txt"
            grep -Fq "Authority=${EXPECTED_SIGNING_IDENTITY}" "${RUNNER_TEMP}/unimail-codesign.txt"
            hdiutil detach "${mount_point}" >/dev/null
            echo "signing=developer-id" >> "${GITHUB_OUTPUT}"
            echo "identity=${EXPECTED_SIGNING_IDENTITY}" >> "${GITHUB_OUTPUT}"
            echo "notarized=true" >> "${GITHUB_OUTPUT}"
          else
            echo "signing=adhoc" >> "${GITHUB_OUTPUT}"
            echo "identity=" >> "${GITHUB_OUTPUT}"
            echo "notarized=false" >> "${GITHUB_OUTPUT}"
          fi
          echo "path=${dmg}" >> "${GITHUB_OUTPUT}"
      - name: 验证 macOS Universal 原生应用可启动
        shell: pwsh
        run: ./scripts/check-native-startup.ps1 -TargetRoot target/universal-apple-darwin/release
      - name: 暂存 macOS 候选与 provenance
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-contract.mjs stage --platform macos --installer "${{ steps.macos-package.outputs.path }}" --output-dir "${RUNNER_TEMP}/unimail-macos-candidate" --version "${{ needs.validate.outputs.version }}" --tag "${{ needs.validate.outputs.tag }}" --commit "${{ github.sha }}" --signing "${{ steps.macos-package.outputs.signing }}" --signing-identity "${{ steps.macos-package.outputs.identity }}" --notarized "${{ steps.macos-package.outputs.notarized }}" --startup-passed true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-macos-${{ needs.validate.outputs.tag }}
          path: ${{ runner.temp }}/unimail-macos-candidate/*
          if-no-files-found: error
          retention-days: 14
      - name: 清理 macOS 临时签名材料
        if: always()
        shell: bash
        run: |
          set +e
          mount_point="${RUNNER_TEMP}/unimail-dmg"
          if mount | grep -Fq "on ${mount_point} "; then
            hdiutil detach "${mount_point}" >/dev/null
          fi
          security delete-keychain "${RUNNER_TEMP}/unimail-signing.keychain-db" >/dev/null 2>&1
          rm -f "${RUNNER_TEMP}/unimail-signing.p12" "${RUNNER_TEMP}/unimail-macos-signing.json" "${RUNNER_TEMP}/unimail-identities.txt" "${RUNNER_TEMP}/unimail-codesign.txt"

  assemble:
    name: 只读组装发布资产
    needs: [validate, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-candidate-*-${{ needs.validate.outputs.tag }}
          path: release-candidates
      - name: 校验并组装完整 payload
        run: |
          node scripts/release-contract.mjs assemble --input-dir release-candidates --output-dir release-payload --version "${{ needs.validate.outputs.version }}" --tag "${{ needs.validate.outputs.tag }}" --commit "${{ github.sha }}" --changelog CHANGELOG.zh-CN.md
      - name: 复核完整 payload
        run: node scripts/release-contract.mjs verify-payload --payload-dir release-payload --version "${{ needs.validate.outputs.version }}" --tag "${{ needs.validate.outputs.tag }}" --commit "${{ github.sha }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-payload-${{ needs.validate.outputs.tag }}-${{ github.sha }}
          path: release-payload/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: 受保护的单一 GitHub Release 发布器
    needs: [validate, assemble]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-payload-${{ needs.validate.outputs.tag }}-${{ github.sha }}
          path: release-payload
      - name: 再次验证 tag、commit 与 payload
        run: |
          test "$(git rev-parse "${{ needs.validate.outputs.tag }}^{commit}")" = "${{ github.sha }}"
          node scripts/release-contract.mjs verify-payload --payload-dir release-payload --version "${{ needs.validate.outputs.version }}" --tag "${{ needs.validate.outputs.tag }}" --commit "${{ github.sha }}"
      - name: 创建或复用同 commit 草稿并发布
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          meta="release-payload/release-meta.json"
          prerelease="$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8')).prerelease" "${meta}")"
          mapfile -t expected_assets < <(node -e "const m=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));for(const a of m.expectedAssets)console.log(a.name)" "${meta}")

          if gh release view "${RELEASE_TAG}" --json isDraft,targetCommitish,assets > "${RUNNER_TEMP}/existing-release.json" 2>/dev/null; then
            node -e '
              const fs=require("fs");
              const release=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));
              const expected=new Set(process.argv.slice(3));
              if(!release.isDraft) throw new Error("同标签 Release 已公开，拒绝覆盖。");
              if(release.targetCommitish!==process.argv[2]) throw new Error("现有草稿指向不同 commit。");
              for(const asset of release.assets ?? []) if(!expected.has(asset.name)) throw new Error("现有草稿包含非预期资产。");
            ' "${RUNNER_TEMP}/existing-release.json" "${GITHUB_SHA}" "${expected_assets[@]}"
          else
            create_args=(gh release create "${RELEASE_TAG}" --draft --verify-tag --target "${GITHUB_SHA}" --title "Unimail ${RELEASE_TAG}" --notes-file release-payload/release-notes.zh-CN.md)
            if [[ "${prerelease}" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            "${create_args[@]}"
          fi

          for name in "${expected_assets[@]}"; do
            gh release delete-asset "${RELEASE_TAG}" "${name}" --yes >/dev/null 2>&1 || true
          done
          upload_files=()
          for name in "${expected_assets[@]}"; do
            upload_files+=("release-payload/${name}")
          done
          gh release upload "${RELEASE_TAG}" "${upload_files[@]}" --clobber
          gh release view "${RELEASE_TAG}" --json isDraft,targetCommitish,assets > "${RUNNER_TEMP}/uploaded-release.json"
          node -e '
            const fs=require("fs");
            const release=JSON.parse(fs.readFileSync(process.argv[1],"utf8"));
            const meta=JSON.parse(fs.readFileSync(process.argv[2],"utf8"));
            const actual=(release.assets ?? []).map(({name,size})=>({name,size})).sort((a,b)=>a.name.localeCompare(b.name));
            const expected=meta.expectedAssets.map(({name,size})=>({name,size})).sort((a,b)=>a.name.localeCompare(b.name));
            if(!release.isDraft) throw new Error("资产复核前草稿意外公开。");
            if(release.targetCommitish!==meta.commit) throw new Error("远端草稿 commit 不匹配。");
            if(JSON.stringify(actual)!==JSON.stringify(expected)) throw new Error("远端 Release 资产集合或大小不匹配。");
          ' "${RUNNER_TEMP}/uploaded-release.json" "${meta}"

          edit_args=(gh release edit "${RELEASE_TAG}" --draft=false --title "Unimail ${RELEASE_TAG}" --notes-file release-payload/release-notes.zh-CN.md)
          if [[ "${prerelease}" == "true" ]]; then
            edit_args+=(--prerelease)
          else
            edit_args+=(--prerelease=false)
          fi
          "${edit_args[@]}"
