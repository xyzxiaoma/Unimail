name: 桌面端持续集成

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: 校验并构建 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unimail-windows-unsigned
            paths: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact: unimail-macos-unsigned
            paths: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
    runs-on: ${{ matrix.os }}
    env:
      UNIMAIL_BASE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
      UNIMAIL_HEAD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: 准备 Windows SQLCipher 构建依赖
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $perlPath = (Get-Command perl -ErrorAction SilentlyContinue).Source
          if (-not $perlPath) {
            choco install strawberryperl --no-progress --yes
            "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
            $perlPath = "C:\Strawberry\perl\bin\perl.exe"
          }
          & $perlPath -v

      - name: 安装前端依赖
        run: npm ci

      - name: 审计生产前端依赖
        run: npm audit --omit=dev

      - name: 校验变更路径与发布说明
        run: npm run check:changes

      - name: 校验前端格式、类型与测试
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm test

      - name: 校验 IPC 绑定
        run: npm run check:bindings

      - name: 校验 Rust 格式
        run: cargo fmt --all -- --check

      - name: 校验 Rust Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: 运行 Rust 工作区测试
        run: cargo test --workspace

      - name: 构建未签名测试安装包
        run: npm run tauri build

      - name: 上传未签名测试安装包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 14
