name: 桌面端持续集成

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: 安全与依赖策略
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: npm ci
      - run: npm run check:security
      - run: npm audit --omit=dev
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo audit
      - run: cargo deny check --warn unmaintained

  validate-and-build:
    name: 校验并构建 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unimail-windows-unsigned
            paths: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact: unimail-macos-unsigned
            paths: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
    runs-on: ${{ matrix.os }}
    env:
      UNIMAIL_BASE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
      UNIMAIL_HEAD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: 准备 Windows SQLCipher 构建依赖
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $perlPath = (Get-Command perl -ErrorAction SilentlyContinue).Source
          if (-not $perlPath) {
            choco install strawberryperl --no-progress --yes
            "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
            $perlPath = "C:\Strawberry\perl\bin\perl.exe"
          }
          & $perlPath -v

      - name: 安装前端依赖
        run: npm ci

      - name: 审计生产前端依赖
        run: npm audit --omit=dev

      - name: 校验变更路径与发布说明
        run: npm run check:changes

      - name: 校验安全策略
        run: npm run check:security

      - name: 校验前端格式
        run: npm run format:check

      - name: 校验前端 Lint
        run: npm run lint

      - name: 校验前端类型
        run: npm run typecheck

      - name: 运行前端测试
        run: npm test

      - name: 校验 IPC 绑定
        run: npm run check:bindings

      - name: 校验 Rust 格式
        run: cargo fmt --all -- --check

      - name: 校验 Rust Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: 运行 unimail-core 测试
        run: cargo test -p unimail-core

      - name: 运行 unimail-storage 测试
        run: cargo test -p unimail-storage

      - name: 验证 macOS 所有者专用存储权限
        if: runner.os == 'macOS'
        run: |
          cargo test -p unimail-storage --lib database::tests::unix_profile_storage_permissions_are_enforced_end_to_end -- --exact
          cargo test -p unimail-storage --lib repository::tests::unix_attachment_storage_permissions_are_enforced_end_to_end -- --exact

      - name: 运行 unimail-application 测试
        run: cargo test -p unimail-application

      - name: 运行 Provider conformance 测试
        run: "cargo test -p unimail-providers --lib conformance::"

      - name: 运行 Gmail Provider 测试
        run: "cargo test -p unimail-providers --lib gmail::"

      - name: 运行 Graph HTTP 测试
        run: "cargo test -p unimail-providers --lib graph::client::"

      - name: 运行 Graph 凭据测试
        run: "cargo test -p unimail-providers --lib graph::credential::"

      - name: 运行 Graph OAuth 测试
        run: "cargo test -p unimail-providers --lib graph::oauth::"

      - name: 运行 Graph 时间戳测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::graph_timestamps_convert_to_epoch_milliseconds -- --exact"

      - name: 运行 Graph 初始游标绑定测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::initial_continuation_is_bound_to_account_mailbox_and_limit -- --exact"

      - name: 运行 Graph 初始同步测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::initial_sync_completes_delta_baseline_before_fetching_latest_messages -- --exact"

      - name: 运行 Graph 增量删除测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::incremental_removed_message_becomes_gone_with_new_delta_checkpoint -- --exact"

      - name: 运行 Graph MIME 回复测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::reply_sends_exact_standard_base64_mime_and_accepts_graph_202 -- --exact"

      - name: 运行 Graph 引用附件测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::reference_attachment_returns_typed_unsupported_without_fetching_value -- --exact"

      - name: 运行 Graph 文件附件测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::file_attachment_streams_value_bytes_with_immutable_identity -- --exact"

      - name: 运行 Graph 已读赋值测试
        run: "cargo test -p unimail-providers --lib graph::provider::tests::repeated_read_assignment_is_idempotent_and_returns_revision -- --exact"

      - name: 运行共享 MIME 测试
        run: "cargo test -p unimail-providers --lib mime::"

      - name: 运行 unimail 桌面端测试
        run: cargo test -p unimail

      - name: 构建未签名测试安装包
        run: npm run tauri build

      - name: 验证原生应用可启动
        shell: pwsh
        run: ./scripts/check-native-startup.ps1

      - name: 上传未签名测试安装包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 14
