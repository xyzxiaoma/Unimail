name: 桌面端持续集成

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: 校验并构建 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: unimail-windows-unsigned
            paths: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact: unimail-macos-unsigned
            paths: |
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
    runs-on: ${{ matrix.os }}
    env:
      UNIMAIL_BASE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
      UNIMAIL_HEAD_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 安装前端依赖
        run: npm ci

      - name: 校验变更路径与发布说明
        run: npm run check:changes

      - name: 校验格式、类型、测试与 IPC 绑定
        run: npm run ci:validate

      - name: 构建未签名测试安装包
        run: npm run tauri build

      - name: 上传未签名测试安装包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
          retention-days: 14
